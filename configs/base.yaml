# configs/base.yaml — hyperparams & cờ mặc định cho MỌI scene.
# Đọc bởi scripts/run_all.sh (qua parse đơn giản) hoặc tham khảo tay.
#
# Quyết định đã chốt:
#   - Train PINHOLE trực tiếp (bỏ qua distortion k≈0.008 của SIMPLE_RADIAL).
#     intrinsics test_poses.csv đã là pinhole & khớp f/cx/cy train -> nhất quán.
#   - KHÔNG dùng --eval: train trên TOÀN BỘ ảnh train; test render qua CSV riêng.

train:
  iterations: 30000
  save_iterations: [7000, 30000]
  test_iterations: [7000, 30000]
  # optimizer_type: sparse_adam    # TẮT: bản diff-gaussian-rasterization dr_aa
                                    # (commit 9c5c2028) KHÔNG có SparseGaussianAdam.
                                    # Repo tự fallback Adam mặc định -> chất lượng như nhau, chậm hơn.
  antialiasing: true               # EWA 2D screen-space low-pass (repo dr_aa, h_var=0.3)
  sh_degree: 3
  # Densification tuning cho aerial (bật qua env run_all.sh, rỗng = mặc định repo).
  # densify_grad_threshold: 0.0002 (repo)   -> aerial thử 0.00015 (densify tích cực hơn)
  # densify_until_iter:     15000  (repo)   -> aerial thử 20000 (kéo dài khi train 30k)
  # percent_dense:          0.01   (repo)
  # ⚠️ densify mạnh -> model to hơn -> KIỂM kích thước JPG submission (≤350MB) sau ablation.

# Mip-Splatting 3D filter (world-space low-pass, chống aliasing ở novel pose).
# Bù cho việc rasterizer dr_aa chỉ có low-pass 2D screen-space. Pure-Python, KHÔNG rebuild CUDA.
# Bật khi train: --mip_filter (env MIP=1 trong run_all.sh). Render PHẢI khớp cờ (filter_3D lưu trong PLY).
mip:
  enable: false

# Depth regularization: cần sinh depth (Depth-Anything-V2) + make_depth_scale.py TRƯỚC.
# Bật sau khi có baseline hợp lệ. Để trống depth_dir = tắt.
depth:
  enable: false
  depth_dir: ""                    # vd outputs/depths/<scene>

# Exposure compensation cho ảnh drone ngoài trời (bật ở vòng tối ưu).
exposure:
  enable: false
  exposure_lr_init: 0.001
  exposure_lr_final: 0.0001
  exposure_lr_delay_steps: 5000
  exposure_lr_delay_mult: 0.001

render:
  antialiasing: true               # PHẢI khớp train.antialiasing

eval:
  psnr_max: 30.0                   # giả định cho PSNR_norm — chỉnh khi BTC công bố
